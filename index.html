<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALQUIPC - Panel de facturación</title>
    <!-- Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .container {
            margin-top: 40px;
        }
        .resumen {
            background-color: #e0f7fa;
            padding: 20px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 class="center-align blue-text text-darken-2">Simulador de Facturación</h2>
        <p class="center-align flow-text">Herramienta para calcular las solicitudes de alquiler de equipos portátiles.</p>

        <div class="row">
            <!-- Formulario -->
            <div class="col s12 m7">
                <div class="card-panel">
                    <h5 class="blue-text">Ingreso de datos</h5>
                    <form id="quote-form">
                        
                        <div class="input-field">
                            <input type="text" id="client-name" name="clientName" required>
                            <label for="client-name">Nombre completo (Solo letras)</label>
                        </div>

                        <div class="input-field">
                            <input type="email" id="client-email" name="clientEmail" required>
                            <label for="client-email">Correo electrónico</label>
                        </div>

                        <div class="input-field">
                            <input type="number" id="equipment-count" name="equipment" min="2" required>
                            <label for="equipment-count">Número de equipos (Mínimo 2)</label>
                        </div>

                        <div class="input-field">
                            <input type="number" id="initial-days" name="initialDays" min="1" required>
                            <label for="initial-days">Días iniciales</label>
                        </div>

                        <div class="input-field">
                            <input type="number" id="extra-days" name="extraDays" min="0" value="0">
                            <label for="extra-days">Días adicionales</label>
                        </div>

                        <div class="input-field">
                            <select id="location-option" name="location">
                                <option value="" disabled selected>Elige una opción</option>
                                <option value="ciudad">Dentro de la ciudad</option>
                                <option value="foranea">Fuera de la ciudad (+5%)</option>
                                <option value="local">Dentro del establecimiento (-5%)</option>
                            </select>
                            <label>Modalidad de alquiler</label>
                        </div>

                        <div class="input-field">
                            <textarea id="notes" name="notes" class="materialize-textarea"></textarea>
                            <label for="notes">Observaciones internas</label>
                        </div>

                        <button class="btn blue darken-2" type="submit">Calcular Propuesta</button>
                        <button class="btn grey" type="button" id="reset-form">Limpiar</button>
                        
                        <div id="form-messages" class="red-text" style="margin-top: 15px;"></div>
                    </form>
                </div>
            </div>

            <!-- Resumen -->
            <div class="col s12 m5">
                <div class="card-panel resumen">
                    <h5 class="blue-text">Resumen para correo</h5>
                    <div id="summary-output">
                        <p>Completa el formulario para generar el resumen y el valor final a facturar.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Materialize JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
